<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Preview story Men Matar L Matar</title>
    <style>
      :root {
        --bg: #f7f2ea;
        --card: #fffdfc;
        --green: #075437;
        --green-text: #006233;
        --green-soft: #e5f6ec;
        --orange: #f59f26;
        --orange-soft: #fff4df;
        --ink: #082f26;
        --muted: #47635c;
        --beige: #efe8dd;
        --shadow: #ded2bf;
        --line: #d8cdbc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        align-items: flex-start;
        background: #efe8dd;
        display: flex;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        justify-content: center;
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        padding: 12px;
      }

      .story {
        align-items: center;
        background:
          radial-gradient(circle at 14% 0%, rgba(245, 159, 38, 0.2), transparent 34%),
          linear-gradient(180deg, #fff8ec 0%, #f7f2ea 42%, #efe8dd 100%);
        display: flex;
        height: 680px;
        justify-content: center;
        padding: 12px 22px 32px 12px;
        width: 383px;
      }

      .card {
        background: var(--card);
        border: 2px solid var(--green);
        border-radius: 24px;
        box-shadow: 6px 8px 0 var(--shadow);
        color: var(--ink);
        display: flex;
        flex-direction: column;
        height: 100%;
        padding: 12px;
        width: 100%;
      }

      .top {
        align-items: center;
        display: flex;
        justify-content: space-between;
        min-height: 62px;
      }

      .logo {
        background: #fffaf1;
        border: 2px solid rgba(7, 84, 55, 0.15);
        border-radius: 16px;
        box-shadow: 0 6px 0 rgba(7, 84, 55, 0.12);
        height: 58px;
        object-fit: contain;
        object-position: left center;
        padding: 4px;
        width: 58px;
      }

      .pill {
        align-items: center;
        background: var(--green-soft);
        border-radius: 999px;
        color: var(--green);
        display: flex;
        box-shadow: 0 4px 0 rgba(7, 84, 55, 0.12);
        font-size: 12px;
        font-weight: 900;
        height: 30px;
        justify-content: center;
        padding: 0 11px;
        text-transform: uppercase;
      }

      .hero {
        align-items: center;
        background: var(--green);
        border-radius: 28px;
        color: white;
        display: flex;
        flex-direction: column;
        margin-top: 6px;
        padding: 12px 14px 14px;
      }

      .hero-title {
        font-size: 26px;
        font-weight: 1000;
        line-height: 1;
        text-align: center;
        text-transform: uppercase;
      }

      .airports {
        align-items: center;
        display: flex;
        gap: 13px;
        margin-top: 10px;
      }

      .airport {
        font-size: 38px;
        font-weight: 1000;
        line-height: 1;
      }

      .swap {
        color: var(--orange);
        font-size: 28px;
        font-weight: 1000;
      }

      .price {
        align-items: center;
        background: var(--orange-soft);
        border: 4px solid var(--orange);
        border-radius: 30px;
        box-shadow: 0 6px 0 rgba(245, 159, 38, 0.2);
        display: flex;
        flex-direction: column;
        margin-top: 10px;
        padding: 9px 10px 11px;
      }

      .price-label {
        color: var(--muted);
        font-size: 14px;
        font-weight: 1000;
        text-transform: uppercase;
      }

      .price-row {
        align-items: baseline;
        color: var(--green-text);
        display: flex;
        gap: 10px;
        margin-top: 4px;
      }

      .amount {
        font-size: 52px;
        font-weight: 1000;
        line-height: 1;
      }

      .currency {
        font-size: 18px;
        font-weight: 1000;
      }

      .stack {
        display: flex;
        flex-direction: column;
        gap: 5px;
        margin-top: 8px;
      }

      .info {
        background: var(--beige);
        border-radius: 16px;
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-height: 40px;
        padding: 6px 13px;
      }

      .label {
        color: var(--muted);
        font-size: 8px;
        font-weight: 900;
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      .value {
        color: var(--ink);
        font-size: 14px;
        font-weight: 1000;
      }

      .baggage {
        background: var(--beige);
        border-radius: 18px;
        display: flex;
        flex-direction: column;
        gap: 7px;
        min-height: 60px;
        padding: 7px 13px;
      }

      .bags-row {
        align-items: center;
        display: grid;
        gap: 6px;
        grid-template-columns: repeat(3, 1fr);
      }

      .bag {
        align-items: center;
        background: rgba(255, 253, 252, 0.66);
        border: 1px solid var(--line);
        border-radius: 9px;
        display: flex;
        gap: 4px;
        min-height: 34px;
        padding: 4px;
      }

      .bag-count {
        font-size: 15px;
        font-weight: 1000;
      }

      .bag-icon {
        color: var(--green);
        height: 15px;
        width: 15px;
      }

      .bag-detail {
        font-size: 9px;
        font-weight: 1000;
        line-height: 1.1;
      }
    </style>
  </head>
  <body>
    <main class="story" aria-label="Preview story Instagram">
      <section class="card">
        <header class="top">
          <img class="logo" src="images/favicon-96x96.png" alt="Men Matar L Matar" />
          <div class="pill">Sans visa</div>
        </header>

        <section class="hero">
          <div class="hero-title">Casablanca - Kuala Lumpur</div>
          <div class="airports">
            <div class="airport">CMN</div>
            <div class="swap">↔</div>
            <div class="airport">KUL</div>
          </div>
        </section>

        <section class="price">
          <div class="price-label">A partir de</div>
          <div class="price-row">
            <span class="amount">6.569</span>
            <span class="currency">MAD</span>
          </div>
        </section>

        <section class="stack">
          <div class="info">
            <div class="label">Depart</div>
            <div class="value">15 sept. 2026</div>
          </div>
          <div class="info">
            <div class="label">Retour</div>
            <div class="value">22 sept. 2026</div>
          </div>
          <div class="info">
            <div class="label">Compagnie</div>
            <div class="value">Saudia Airlines</div>
          </div>
          <div class="info">
            <div class="label">Escale</div>
            <div class="value">Transit via JED</div>
          </div>
          <div class="baggage">
            <div class="label">Bagages</div>
            <div class="bags-row">
              <div class="bag">
                <span class="bag-count">1</span>
                <svg class="bag-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M8 8V6a4 4 0 0 1 8 0v2" />
                  <path d="M5 9h14l1 10H4L5 9Z" />
                  <path d="M9 12h6" />
                </svg>
                <span class="bag-detail">Effet<br />perso</span>
              </div>
              <div class="bag">
                <span class="bag-count">1</span>
                <svg class="bag-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M9 7V5a3 3 0 0 1 6 0v2" />
                  <rect x="7" y="7" width="10" height="12" rx="2" />
                  <path d="M10 20v1M14 20v1" />
                </svg>
                <span class="bag-detail">Cabine<br />7kg</span>
              </div>
              <div class="bag">
                <span class="bag-count">1</span>
                <svg class="bag-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M8 6V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v1" />
                  <rect x="5" y="6" width="14" height="13" rx="2" />
                  <path d="M9 10v5M15 10v5" />
                </svg>
                <span class="bag-detail">Soute<br />23kg</span>
              </div>
            </div>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
